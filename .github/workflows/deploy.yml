name: Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          # Ensuring the API points to your SSL domain
          echo "REACT_APP_API_URL=https://jaychhantbar.ddns.net/api" > .env
          npm install
          npm run build
          # Debug step: list files to prove they exist for the next step
          ls -R build 

      - name: Upload Build to Frontend Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Path relative to the root of the repo
          source: "frontend/build"
          target: "/home/ubuntu/deploy_temp"
          strip_components: 1

      - name: Move Files to Web Root
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # This part is safe: it only touches /var/www/html
            # Your SSL and Nginx configs in /etc/nginx/ are untouched.
            sudo rm -rf /var/www/html/*
            sudo cp -r /home/ubuntu/deploy_temp/frontend/build/* /var/www/html/
            rm -rf /home/ubuntu/deploy_temp
            sudo systemctl restart nginx
            echo "✅ Deployment successful!"
