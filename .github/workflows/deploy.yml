name: Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "REACT_APP_API_URL=https://jaychhantbar.ddns.net/api" > .env
          npm install
          npm run build

      - name: Upload to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/dist"
          target: "/home/ubuntu/deploy_temp"

      - name: Deploy with Path Discovery
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Locate the 'dist' folder anywhere inside the temp dir
            SOURCE_DIR=$(find /home/ubuntu/deploy_temp -type d -name "dist" | head -n 1)
            
            if [ -z "$SOURCE_DIR" ]; then
              echo "❌ ERROR: 'dist' folder not found in /home/ubuntu/deploy_temp"
              ls -R /home/ubuntu/deploy_temp
              exit 1
            fi
            
            echo "🚀 Found build files in: $SOURCE_DIR"
            
            # 2. Clear and Copy
            sudo rm -rf /var/www/html/*
            sudo cp -r $SOURCE_DIR/* /var/www/html/
            
            # 3. Fix Permissions
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            
            # 4. Clean up
            rm -rf /home/ubuntu/deploy_temp
            sudo systemctl restart nginx
            echo "✅ Site is now LIVE at https://jaychhantbar.ddns.net"
