name: Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "REACT_APP_API_URL=https://jaychhantbar.ddns.net/api" > .env
          npm install
          npm run build
          # This confirms the folder is 'dist' and not 'build'
          ls -F 

      - name: Upload Dist to Frontend Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Switched to dist
          source: "frontend/dist"
          target: "/home/ubuntu/deploy_temp"
          strip_components: 1

      - name: Move Files to Web Root
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Only touching the web content - SSL/Nginx configs are safe
            sudo rm -rf /var/www/html/*
            # Moving from dist instead of build
            sudo cp -r /home/ubuntu/deploy_temp/frontend/dist/* /var/www/html/
            rm -rf /home/ubuntu/deploy_temp
            sudo systemctl restart nginx
            echo "✅ Deployment successful from dist folder!"
