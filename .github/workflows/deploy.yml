name: Production Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          echo "REACT_APP_API_URL=https://jaychhantbar.ddns.net/api" > .env
          npm install
          npm run build

      - name: Deploy Frontend to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "frontend/build/*"
          target: "/tmp/frontend-deploy" # Upload to tmp first to avoid permission issues

      - name: Finalize Frontend Files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/html/*
            sudo cp -r /tmp/frontend-deploy/frontend/build/* /var/www/html/
            sudo systemctl restart nginx
